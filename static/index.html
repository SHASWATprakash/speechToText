<!DOCTYPE html>
<html>
<head>
    <title>Speech Intelligence</title>

    <style>
        body {
            font-family: -apple-system;
            background: #0f0f10;
            color: white;
            text-align: center;
            padding-top: 100px;
        }

        #wave {
            width: 120px;
            height: 120px;
            margin: 40px auto;
            border-radius: 50%;
            background: radial-gradient(circle, #444, #111);
            opacity: 0.2;
            transition: 0.2s;
        }

        .active {
            transform: scale(1.25);
            opacity: 1;
        }

        #output {
            font-size: 24px;
            margin-top: 30px;
            width: 70%;
            margin: auto;
        }

        button {
            padding: 12px 25px;
            margin: 10px;
            border-radius: 20px;
            border: none;
            background: #222;
            color: white;
        }
    </style>
</head>

<body>

<h2>Speech Intelligence</h2>

<div id="wave"></div>
<div id="output">Speak something...</div>

<button id="btn">Start</button>

<script>
let ws;
let audioContext;
let processor;
let stream;
let source;
let running = false;

const btn = document.getElementById("btn");
const wsUrl = () => {
    const protocol = window.location.protocol === "https:" ? "wss:" : "ws:";
    return `${protocol}//${window.location.host}/ws`;
};

btn.onclick = () => running ? stop() : start();

async function start() {
ws = new WebSocket("wss://speechtotext-dwht.onrender.com/ws");

    ws.onmessage = (e) => {
        console.log("TEXT:", e.data);
        document.getElementById("output").innerText = e.data;
    };

    stream = await navigator.mediaDevices.getUserMedia({ audio: true });

    audioContext = new AudioContext({ sampleRate: 16000 });

    await audioContext.audioWorklet.addModule("/static/processor.js");

    source = audioContext.createMediaStreamSource(stream);

    processor = new AudioWorkletNode(audioContext, "processor");

    processor.port.onmessage = (event) => {
        const { buffer, volume } = event.data;

        const wave = document.getElementById("wave");

        if (volume > 0.02) wave.classList.add("active");
        else wave.classList.remove("active");

        if (ws.readyState === 1) {
            ws.send(buffer);
        }
    };

    source.connect(processor);
    processor.connect(audioContext.destination);

    running = true;
    btn.innerText = "Stop";

    console.log("▶️ Started");
}

function stop() {
    if (!running) return;

    processor.disconnect();
    source.disconnect();

    audioContext.close();

    stream.getTracks().forEach(t => t.stop());

    ws.close();

    document.getElementById("wave").classList.remove("active");

    running = false;
    btn.innerText = "Start";

    console.log("⛔ Stopped");
}
</script>

</body>
</html>
